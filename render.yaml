services:
  - type: web
    name: truthlens-api
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      && pip install tensorflow-cpu
      && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
